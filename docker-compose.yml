services:
  postgres:
    image: postgres:15-alpine
    container_name: quickchat-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quickchat
      POSTGRES_PASSWORD: quickchat-secret
      POSTGRES_DB: quickchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickchat -d quickchat"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quickchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn:4.6.3
    container_name: quickchat-coturn
    restart: unless-stopped
    command:
      - -c
      - /etc/coturn/turnserver.conf
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  server:
    build:
      context: ./server
    container_name: quickchat-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      coturn:
        condition: service_started
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://quickchat:quickchat-secret@postgres:5432/quickchat?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      args:
        VITE_BACKEND_URL: http://localhost:5000
    container_name: quickchat-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  postgres_data: